route:
  group_by: ["alertname", "cluster", "environment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - matchers:
        - severity=critical
      receiver: critical
      continue: true
    - matchers:
        - alertname=SecurityThreatDetected
      receiver: security
      continue: true

receivers:
  - name: default
    # Configure with actual notification channels (email, Slack, PagerDuty) in production.
    # See https://prometheus.io/docs/alerting/latest/configuration/ for reference.

  - name: critical
    # Add critical alert routing (e.g., PagerDuty, OpsGenie) here.

  - name: security
    # Add security-specific routing (e.g., SOC SIEM webhook) here.

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - cluster
      - instance
