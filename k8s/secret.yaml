apiVersion: v1
kind: Secret
metadata:
  name: aimedres-secrets
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
type: Opaque
# Values must be base64-encoded. Replace all placeholder values before deploying.
# Generate with: echo -n 'your-value' | base64
stringData:
  SECRET_KEY: "REPLACE_WITH_STRONG_SECRET_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_BASE64_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_STRONG_MINIO_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_STRONG_REDIS_PASSWORD"
