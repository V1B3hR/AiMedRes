apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimedres-postgres
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aimedres-postgres
  template:
    metadata:
      labels:
        app: aimedres-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: aimedres
            - name: POSTGRES_USER
              value: aimedres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aimedres-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - aimedres
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: aimedres-postgres
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
    app.kubernetes.io/component: postgres
spec:
  selector:
    app: aimedres-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
