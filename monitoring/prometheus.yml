global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aimedres-production
    environment: production

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # AiMedRes application metrics
  - job_name: aimedres
    scrape_interval: 15s
    static_configs:
      - targets:
          - aimedres:8000
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  # Redis metrics (via redis_exporter)
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  # Node/container metrics (via node_exporter)
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
