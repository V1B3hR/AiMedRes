apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aimedres-data
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aimedres-logs
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
