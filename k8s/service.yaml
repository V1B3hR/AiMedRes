apiVersion: v1
kind: Service
metadata:
  name: aimedres
  namespace: aimedres
  labels:
    app.kubernetes.io/name: aimedres
    app.kubernetes.io/component: app
spec:
  selector:
    app: aimedres
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
  type: ClusterIP
